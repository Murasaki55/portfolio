<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-portfolio QD Compétences</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code&family=IBM+Plex+Mono&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="CSS/competenceStyle.css"/>
    <link rel="stylesheet" href="CSS/dropdown.css"/>
    <link rel="stylesheet" href="CSS/header.css">
    <link rel="stylesheet" href="CSS/globalStyle.css">
</head>
<body>
    <script src="dropdown.js" defer></script>
    <script src="competence.js" defer></script>
    <header>
        <div id="header"></div>
        <div class="body">
            <h2 class="tree"><a href="./" class="tree">Accueil</a> > Mes compétences</h2>
        </div>
    </header>
    <script>
        fetch('header.html')
            .then(res => res.text())
                .then(html => {
        document.getElementById('header').innerHTML = html;

        const blocLinks = document.querySelector(".bloc-links");
        const dropdown = document.querySelector(".dropdown");

        dropdown.addEventListener('mouseover', () => {
            blocLinks.style.maxHeight = blocLinks.scrollHeight + "px";
        });

        dropdown.addEventListener('mouseout', () => {
            blocLinks.style.maxHeight = "0px";
        });
    });
    </script>
    <div class="body">
        <h1>Mes compétences</h1>
        <p>Actuellement en troisième année de BUT Informatique, parcours réalisation d'applications : conception, développement, validation</p>
        <div class="row divbutt">
            <button class="buttCompet">Réaliser</button>
            <button class="buttCompet">Optimiser</button>
            <button class="buttCompet">Administrer</button>
            <button class="buttCompet">Gérer</button>
            <button class="buttCompet">Conduire</button>
            <button class="buttCompet">Collaborer</button>
        </div>
        <div id="compétences">
            
        </div>
    </div>
    <footer id="footerabs">
        <div id="footer"></div>
    </footer>
    <script>
        fetch('footer.html')
            .then(res => res.text())
            .then(html => document.getElementById('footer').innerHTML = html);
    </script>
    
</body>
</html>
