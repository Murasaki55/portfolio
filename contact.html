<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-portfolio QD Formation</title>
        <link href="https://fonts.googleapis.com/css2?family=Fira+Code&family=IBM+Plex+Mono&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="CSS/dropdown.css"/>
    <link rel="stylesheet" href="CSS/header.css">
    <link rel="stylesheet" href="CSS/globalStyle.css">
    <link rel="stylesheet" href="CSS/contact.css">
</head>
<body>
    <script src="dropdown.js" defer></script>
    <header>
        <div id="header"></div>
        <div class="body">
            <h2 class="tree"><a href="./" class="tree">Accueil</a> > Me joindre</h2>
        </div>
    </header>
    <script>
        fetch('header.html')
            .then(res => res.text())
                .then(html => {
        document.getElementById('header').innerHTML = html;

        const blocLinks = document.querySelector(".bloc-links");
        const dropdown = document.querySelector(".dropdown");

        dropdown.addEventListener('mouseover', () => {
            blocLinks.style.maxHeight = blocLinks.scrollHeight + "px";
        });

        dropdown.addEventListener('mouseout', () => {
            blocLinks.style.maxHeight = "0px";
        });
    });
    </script>
    <div class="body">
        <h1>Me joindre</h1>
        <p>Vous pouvez me joindre via le formulaire ci-dessous ou bien par mail ou téléphone :</p>
        <ul>
            <li>Mail universitaire : quentin.dacquin@etu.univ-smb.fr</li>
            <li>Mail perso : dacquinquentin@gmail.com</li>
            <li>Téléphone : 0767308735</li>
        </ul>
        <form action="https://formsubmit.co/quentin.dacquin@etu.univ-smb.fr" method="POST">
            <label>Nom Prénom</label>
            <input type="text" name="nom" placeholder="Nom" required>
            <input type="text" name="prenom" placeholder="Prénom" required>

            <label>Email</label>
            <input type="email" name="email" placeholder="Adresse email" required>

            <label>Entreprise</label>
            <input type="text" name="entreprise" placeholder="Entreprise (optionnel)">
            
            <label>Objet</label>
            <input type="text" name="objet" placeholder="Objet" required>

            <label>Message</label>
            <textarea name="message" placeholder="Message" required></textarea>

            <!-- Options FormSubmit -->
            <input type="hidden" name="_subject" value="Nouveau message – Portfolio">
            <input type="hidden" name="_captcha" value="false">

            <!-- Anti-spam -->
            <input type="text" name="_honey" style="display:none">

            <button type="submit">Envoyer</button>
        </form>

    </div>
    <footer id="footerstat">
        <div id="footer"></div>
    </footer>
    <script>
        fetch('footer.html')
            .then(res => res.text())
            .then(html => document.getElementById('footer').innerHTML = html);
    </script>
</body>
</html>
