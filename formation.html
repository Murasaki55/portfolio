<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-portfolio QD Formation</title>
        <link href="https://fonts.googleapis.com/css2?family=Fira+Code&family=IBM+Plex+Mono&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="CSS/formationstyle.css">
    <link rel="stylesheet" href="CSS/dropdown.css"/>
    <link rel="stylesheet" href="CSS/header.css">
    <link rel="stylesheet" href="CSS/globalStyle.css">
</head>
<body>
    <script src="dropdown.js" defer></script>
    <header>
        <div id="header"></div>
        <div class="body">
            <h2 class="tree"><a href="./" class="tree">Accueil</a> > Ma formation</h2>
        </div>
    </header>
    <script>
        fetch('header.html')
            .then(res => res.text())
                .then(html => {
        document.getElementById('header').innerHTML = html;

        const blocLinks = document.querySelector(".bloc-links");
        const dropdown = document.querySelector(".dropdown");

        dropdown.addEventListener('mouseover', () => {
            blocLinks.style.maxHeight = blocLinks.scrollHeight + "px";
        });

        dropdown.addEventListener('mouseout', () => {
            blocLinks.style.maxHeight = "0px";
        });
    });
    </script>
    <div class="body">
        <h1>Ma formation</h1>
        <div class="form">
            <img src="./image/IUT.jpg" class="image">
            <div>
                <h2>2025-2026</h2>
                <p>Troisème année de BUT Informatique, Université Savoie Mont Blanc - IUT d'Annecy.</p>
            </div>
        </div>
        <div class="form">
            <img src="./image/Vaugelas.jpg" class="image">
            <div>
                <h2>2023</h2>
                <p>Baccalauréat général, spécialité Mathématiques et NSI (Numérique et Science Informatique), mention bien, Lycée Vaugelas, Chambéry.</p>
            </div>
        </div>
    </div>
    <footer id="footerstat">
        <div id="footer"></div>
    </footer>
    <script>
        fetch('footer.html')
            .then(res => res.text())
            .then(html => document.getElementById('footer').innerHTML = html);
    </script>
</body>
</html>
